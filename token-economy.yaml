# Token Economy universal framework config.
# Defaults favor project-scoped installs and low startup context.

wiki_root: .
agent_adapter: auto
context_max_tokens: auto
refresh_threshold: 0.20
warn_threshold: 0.15
default_scope: project
model_registry: ./models.yaml
profile: ultra
external_adapters: []
output_filter_archive: true
# Session-aware suppression: suppresses lines already seen in this TOKEN_ECONOMY_SESSION_ID.
output_filter_session_aware: false
output_filter_rules: .token-economy/output-filter-rules.txt
